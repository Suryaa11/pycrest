image:
  repository: your-dockerhub-username/frontend
  tag: latest
  pullPolicy: IfNotPresent
  build: true   # for Helm, just a flag to indicate local build if using build pipeline

service:
  type: ClusterIP
  port: 3000

env:
  VITE_API_BASE_URL: "http://localhost:3000/api"
  SERVICE_NAME: "frontend-service"
  PORT: 3000
  MONGODB_URI: "mongodb://pycrest:pycrest123@mongodb:27017/pycrest?authSource=admin"
  MONGODB_DB: "pycrest"
  JWT_SECRET: "pycrest_jwt_secret_devops_2024"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"
  ENVIRONMENT: "development"
  INTERNAL_SERVICE_TOKEN: "e9ccbcbfd93e305d56e67a751664bd4b79ed32b23a896cc71958b98008f0fbcb"
  UPLOAD_BASE_PATH: "/uploads"
  AUTH_SERVICE_URL: "http://auth-service:3001"
