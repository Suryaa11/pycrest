apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-service-route
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.path }}
      backendRefs:
        - name: auth-service
          port: {{ .Values.service.port }}