      - auth-service
      - loan-service
      - emi-service
      - wallet-service
      - payment-service
      - verification-service
      - admin-service
      - manager-service
    networks:
      - paycrest-net

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes this URL at BUILD time into the JS bundle
        # Must point to wherever your API gateway is reachable FROM THE BROWSER
        VITE_API_BASE_URL: http://44.223.16.184:3000/api
    container_name: paycrest-frontend
    restart: unless-stopped
    ports:
      - "80:80"             # visit http://localhost in browser
    depends_on:
      - api-gateway
    networks:
      - paycrest-net
